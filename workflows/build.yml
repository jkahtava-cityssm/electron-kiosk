name: Build Kiosk App
on:
  push:
    tags:
      - "v*" # Trigger build when you push a tag (e.g. v1.0.0)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 20

      - name: Install Dependencies
        run: npm ci

      - name: Make Packages
        run: npm run make

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/make/**/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
